apis:
  - name: Frax Finance Combined Data API
    description: >
      Returns aggregated protocol data across Frax Finance including core token
      metrics (FRAX, FXS, FPI, FPIS, frxETH, sfrxETH, veFXS), liquidity staking
      pool positions, AMO (Algorithmic Market Operations) holdings across Curve,
      Convex, lending, and liquidity subsystems, plus collateral ratio and
      decentralization ratio.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://docs.frax.finance/smart-contracts/api
    baseURL: https://api.frax.finance
    tags:
      - FRAX
      - FXS
      - frxETH
      - AMO
      - Collateral
      - Protocol Data
    properties:
      - type: Documentation
        url: https://docs.frax.finance/smart-contracts/api
      - type: OpenAPI
        url: https://api.frax.finance/v1/docs
      - type: OpenAPI
        url: https://api.frax.finance/v2/docs
    contact:
      - FN: Frax Finance
        url: https://frax.finance
        email: ""
  - name: Frax Finance Pools API
    description: >
      Returns an array of liquidity pool and farm objects across Ethereum,
      Arbitrum, Avalanche, and BSC. Each object includes the pool identifier,
      chain, platform (Convex, Curve, Balancer, Fraxswap, Uniswap, etc.), LP
      and farm contract addresses, pool token and reward token lists, total
      liquidity locked (USD), current APY, maximum APY, and per-token reward
      breakdowns with APR percentages and USD value per day. Covers 270+ pools.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://docs.frax.finance/smart-contracts/api
    baseURL: https://api.frax.finance
    tags:
      - Liquidity Pools
      - APY
      - Farming
      - Rewards
      - Multi-chain
    properties:
      - type: Documentation
        url: https://docs.frax.finance/smart-contracts/api
      - type: OpenAPI
        url: https://api.frax.finance/v1/docs
      - type: OpenAPI
        url: https://api.frax.finance/v2/docs
    contact:
      - FN: Frax Finance
        url: https://frax.finance
        email: ""
