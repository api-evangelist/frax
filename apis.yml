name: Frax Finance
description: >
  Frax Finance is a fractional-algorithmic stablecoin protocol offering FRAX
  (USD-pegged stablecoin), FPI (Frax Price Index stablecoin pegged to a consumer
  goods basket), frxETH (liquid ETH staking derivative), and supporting DeFi
  infrastructure including Fraxswap, Fraxlend, and Fraxtal L2. The protocol
  operates Algorithmic Market Operations (AMOs) to manage collateral and generate
  revenue, and exposes public REST APIs for querying token supply, collateral
  ratios, AMO positions, pool APRs, and frxETH staking analytics.
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/frax/refs/heads/main/apis.yml
